<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR-APP</title>
</head>
<style>
    
    body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    h1{
        height: 8vh;
        width: 26vw;
        border: 4px black solid;
        border-radius:11px;
        display: flex;
        justify-content: center;
        align-items: center;
    } 

    #calculator{
        height: 70vh;
        width: 26vw;
        margin-top: 2vh;
        border: 5px #4e4d5f solid;
        border-radius: 10px;
        background-color: #4e4d5f;
        
    }

    #display{ 
        height: 15vh;
        width: 25vw;
        display: flex;
        justify-content: center;
        border: 2px black solid;
        border-radius: 10px;
        margin: auto;
        margin-top: 2vh;
        font-size: xx-large;
        /* margin-top: 2vh; */
    }

    button{
         border: none;
         font-size: xx-large;
    }

    .rows{
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        margin-top: 2vh;
        margin-left: 0.1vw;

    }

    .black-btn{
        height: 8vh;
        width: 6vw;
        border-radius: 7px;
        background-color: black;
        color: white;

    }

    .grey-btn{
        height: 8vh;
        width: 6vw;
        border-radius: 7px;
        background-color:#808080;
    }

    #yellow-btn{
        height: 8vh;
        width: 6vw;
        background-color: orange;
        border-radius: 7px;
        /* margin-right: -0.44vw; */
    }


    #cross{
         height: 8vh;
         width: 6vw;
         border-radius: 7px;
    }

    #c-btn{
        background-color: azure;
    }
    #zero{
        height: 8vh;
        width: 12vw;
        margin-left: 0.1vw;
        border-radius: 7px;

    }
    /* #lastrow{
        margin-left: 0.6vw;
    } */
</style>
<body>
    <h1>My CALCULATOR🧮</h1>
    <div id="calculator">
        <input type="text" id="display" class="basictwo">
        <div id="keys" class="basictwo">
            <div class="rows">
                <button class="grey-btn" id="c-btn">C</button>
                <button class="grey-btn">+/-</button>
                <button class="grey-btn">%</button>
                <button class="grey-btn">÷</button>
            </div>
            <div class="rows">
                <button class="black-btn">7</button>
                <button class="black-btn">8</button>
                <button class="black-btn">9</button>
                <button class="black-btn">×</button>
            </div>
            <div class="rows">
                <button class="black-btn">4</button>
                <button class="black-btn">5</button>
                <button class="black-btn">6</button>
                <button class="black-btn">-</button>
            </div>
            <div class="rows">
                <button class="black-btn">3</button>
                <button class="black-btn">2</button>
                <button class="black-btn">1</button>
                <button class="black-btn">+</button>
            </div>
            <div class="rows" id="lastrow" >
                <button id="zero">0</button>
                <button id="cross">⌫</button>
                <button id="yellow-btn">=</button>
            </div>
            

        </div>
    </div>


    <script>
        let display=document.querySelector("input");
        let buttons=document.querySelectorAll("button");
        
        buttons.forEach((btn)=>{
            btn.addEventListener("click",()=>{
                let value=btn.textContent;
                
            if(value==="C"){
                display.value="";

            }else if(value==="⌫"){
                display.value= display.value.slice(0,-1);
            }else if(value==="="){
                try{
                    let expression=display.value.replace(/×/g, "*").replace(/÷/g, "/");
                    display.value=eval(expression);

                }catch{
                display.value="Error"
                }
            }

            else if(display.value==="+/-"){
                if(display.value.startsWith("-")){
                    display.value=display.value.slice(1)

                }else{
                    display.value="-"+ display.value;
                }

            }

            else{
                display.value +=value;
            }
        })

        })
    
    </script>

 
</body>
</html>
